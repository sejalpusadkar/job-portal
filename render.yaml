services:
  - type: web
    name: it-job-portal-backend
    env: java
    rootDir: backend
    plan: free
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/*.jar
    healthCheckPath: /health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: PORT
        value: "8080"
      # Set these in Render dashboard as SECRET values:
      # DB_URL=jdbc:mysql://<ps-host>/<db>?sslMode=REQUIRED
      # DB_USERNAME=<ps-username>
      # DB_PASSWORD=<ps-password>
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      # Optional:
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
