# Production profile
server.port=${SERVER_PORT:8081}
spring.application.name=job-portal

# Database (override in docker-compose / environment)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://mysql:3306/job_portal_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
# In production we don't want Hibernate silently changing the schema.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Flyway (schema migrations)
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true

# JWT (MUST be overridden in production)
jwt.secret=${JWT_SECRET:CHANGE_ME_IN_PROD_32_CHARS_MINIMUM________________}
jwt.expiration=${JWT_EXPIRATION_MS:86400000}

# Admin registration safety gate (leave empty to disable)
admin.registration.code=${ADMIN_REGISTRATION_CODE:}

# CORS (set your real domains here)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://your-frontend-domain.example}

# Hide detailed error messages in production
server.error.include-message=never

# Email
spring.mail.host=${SMTP_HOST:}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
mail.required=true

# Password reset behavior
password.reset.debug=false

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# File uploads (mount a volume in Docker for persistence)
file.upload-dir=${FILE_UPLOAD_DIR:/data/uploads}
