# Production profile
server.port=${PORT:${SERVER_PORT:8080}}
spring.application.name=job-portal

# (Optional) allow loading a mounted env file in containerized deployments.
spring.config.import=optional:file:.env[.properties],optional:file:/data/.env[.properties]

# Database (override in docker-compose / environment)
spring.datasource.url=${DB_URL:${SPRING_DATASOURCE_URL:}}
spring.datasource.username=${DB_USERNAME:${SPRING_DATASOURCE_USERNAME:}}
spring.datasource.password=${DB_PASSWORD:${SPRING_DATASOURCE_PASSWORD:}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
# In production we don't want Hibernate silently changing the schema.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Flyway (schema migrations)
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true

# JWT (MUST be overridden in production)
jwt.secret=${JWT_SECRET:CHANGE_ME_IN_PROD_32_CHARS_MINIMUM________________}
jwt.expiration=${JWT_EXPIRATION_MS:86400000}

# Admin registration safety gate (leave empty to disable)
admin.registration.code=${ADMIN_REGISTRATION_CODE:}

# CORS (set your real domains here)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://your-frontend-domain.example}

# Hide detailed error messages in production
server.error.include-message=never

# Email
spring.mail.host=${SMTP_HOST:}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:${SMTP_USER:}}
spring.mail.password=${SMTP_PASSWORD:${SMTP_PASS:}}
spring.mail.from=${SMTP_FROM:${spring.mail.username:}}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=${SMTP_SSL_TRUST:${spring.mail.host}}
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.properties.mail.debug=${MAIL_DEBUG:false}
mail.required=${MAIL_REQUIRED:true}

# Password reset behavior
password.reset.debug=false

# Frontend origin used for password reset links
app.frontend.origin=${FRONTEND_ORIGIN:https://your-frontend-domain.example}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# File uploads (mount a volume in Docker for persistence)
file.upload-dir=${FILE_UPLOAD_DIR:/data/uploads}
