# Production profile (Render / PlanetScale)
server.port=${PORT:8080}
spring.application.name=job-portal

# Optional: allow loading a mounted env file in containerized deployments.
spring.config.import=optional:file:.env[.properties],optional:file:/data/.env[.properties]

# Database (PlanetScale / MySQL) - MUST come from environment variables.
# IMPORTANT: PlanetScale requires SSL. Your DB_URL should include:
# ?sslMode=REQUIRED&useSSL=true&allowPublicKeyRetrieval=true
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.open-in-view=false

# Flyway (optional in prod; keep OFF by default to avoid deployment failures if schema drift exists)
spring.flyway.enabled=${FLYWAY_ENABLED:false}
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true

# JWT (MUST be set in production)
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION_MS:86400000}

# Admin registration safety gate (leave empty to disable Admin self-registration)
admin.registration.code=${ADMIN_REGISTRATION_CODE:}

# CORS (set your real domains here)
# Set CORS_ALLOWED_ORIGINS to your Vercel domain(s), comma-separated.
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}

# Hide detailed error messages in production
server.error.include-message=never

# Email (optional)
spring.mail.host=${SMTP_HOST:}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:${SMTP_USER:}}
spring.mail.password=${SMTP_PASSWORD:${SMTP_PASS:}}
spring.mail.from=${SMTP_FROM:${spring.mail.username:}}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=${SMTP_SSL_TRUST:${spring.mail.host}}
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.properties.mail.debug=${MAIL_DEBUG:false}
mail.required=${MAIL_REQUIRED:true}

# Password reset behavior
password.reset.debug=false

# Frontend origin used for password reset links
app.frontend.origin=${FRONTEND_ORIGIN:https://your-frontend-domain.example}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# File uploads (mount a volume in Docker for persistence)
file.upload-dir=${FILE_UPLOAD_DIR:/data/uploads}
