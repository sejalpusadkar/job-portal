# Dev profile: run without Postgres using in-memory H2.
server.port=${PORT:${SERVER_PORT:8080}}

spring.datasource.url=jdbc:h2:mem:job_portal_db;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT
jwt.secret=${JWT_SECRET:devOnlySecretChangeMe_32CharsMinimum__________}
jwt.expiration=${JWT_EXPIRATION_MS:86400000}

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001,http://127.0.0.1:3000,http://127.0.0.1:3001}

# Password reset debug helpers
password.reset.debug=true

# Flyway (off for dev H2 profile)
spring.flyway.enabled=false
