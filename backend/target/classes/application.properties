# Server
# Render sets PORT; support both PORT and SERVER_PORT. Default to 8080.
server.port=${PORT:${SERVER_PORT:8080}}
spring.application.name=job-portal
server.error.include-message=always

# Load local env file (optional).
# Supports both ways of starting the backend:
# 1) From backend/ folder (picks up .env)
# 2) From repo root (picks up backend/.env)
spring.config.import=optional:file:.env[.properties],optional:file:backend/.env[.properties]

# Database
# Force IPv4 + allow common local-dev MySQL auth defaults.
# MySQL 8+ often needs allowPublicKeyRetrieval when SSL is disabled.
spring.datasource.url=${DB_URL:jdbc:mysql://127.0.0.1:3306/job_portal_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
# In dev we allow a fallback; in production use profile "prod" which enforces JWT_SECRET.
jwt.secret=${JWT_SECRET:devOnlySecretChangeMe_32CharsMinimum__________}
jwt.expiration=${JWT_EXPIRATION_MS:86400000}

# Admin registration safety gate (set this to enable Admin self-registration)
# Example: admin.registration.code=MY_ADMIN_CODE
# Default for local dev: ADMIN123 (override with ADMIN_REGISTRATION_CODE env var).
admin.registration.code=${ADMIN_REGISTRATION_CODE:ADMIN123}

# CORS (temporary)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001,http://127.0.0.1:3000,http://127.0.0.1:3001}

# JPA
spring.jpa.open-in-view=false

# Email (optional). If not configured, the app will log and skip sending emails.
spring.mail.host=${SMTP_HOST:}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:${SMTP_USER:}}
spring.mail.password=${SMTP_PASSWORD:${SMTP_PASS:}}
spring.mail.from=${SMTP_FROM:${spring.mail.username:}}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=${SMTP_SSL_TRUST:${spring.mail.host}}
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.properties.mail.debug=${MAIL_DEBUG:false}
mail.required=${MAIL_REQUIRED:false}

# Password reset behavior
password.reset.debug=false

# Frontend origin used for password reset links
app.frontend.origin=${FRONTEND_ORIGIN:http://localhost:3000}

# Flyway
# Keep Flyway OFF by default for local dev to avoid unexpected schema changes.
# Production uses application-prod.properties where Flyway is enabled.
spring.flyway.enabled=false
