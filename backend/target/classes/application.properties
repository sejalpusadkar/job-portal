# Server
# Use 8081 by default to avoid clashing with other local services.
# Override at runtime with SERVER_PORT (or Spring's --server.port=...).
server.port=${SERVER_PORT:8081}
spring.application.name=job-portal
server.error.include-message=always

# Database
# Force IPv4 + allow common local-dev MySQL auth defaults.
# MySQL 8+ often needs allowPublicKeyRetrieval when SSL is disabled.
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/job_portal_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=mySuperSecretKeyThatIsAtLeast32CharactersLongForHS256
jwt.expiration=86400000

# Admin registration safety gate (set this to enable Admin self-registration)
# Example: admin.registration.code=MY_ADMIN_CODE
# Default for local dev: ADMIN123 (override with ADMIN_REGISTRATION_CODE env var).
admin.registration.code=${ADMIN_REGISTRATION_CODE:ADMIN123}

# CORS (temporary)
cors.allowed-origins=http://localhost:3000,http://localhost:3001,http://127.0.0.1:3000,http://127.0.0.1:3001

# JPA
spring.jpa.open-in-view=false

# Email (optional). If not configured, the app will log and skip sending emails.
spring.mail.host=${SMTP_HOST:}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Password reset behavior
password.reset.debug=false

# Flyway
# Keep Flyway OFF by default for local dev to avoid unexpected schema changes.
# Production uses application-prod.properties where Flyway is enabled.
spring.flyway.enabled=false
